name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e . pytest
      - run: pytest -q

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift build
        working-directory: macos/WatermarkStudio

